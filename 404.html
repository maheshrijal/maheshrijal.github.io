<!DOCTYPE html>
<html>
    <head>
        <title>Redirect</title>
        <script>
            var path = window.location.pathname;
            
            if (path === "/files") {
                document.location.replace("https://github.com/maheshrjl/files" + path);
            } else {
                document.location.replace("https://github.com/maheshrjl" + path);
            }
        </script>
    </head>
    <body></body>
</html>
