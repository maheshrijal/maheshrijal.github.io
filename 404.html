<!DOCTYPE html>
<html>
<head>
<title>Redirect</title>
<script>
    var path = window.location.pathname;
    var username = "maheshrjl"; // Replace with your GitHub username

    // Remove the leading slash from the path
    path = path.slice(1);

    // Construct the GitHub URL using the captured path and username
    var githubURL = "https://github.com/" + username + "/" + path;

    // Redirect to the constructed GitHub URL
    document.location.replace(githubURL);
</script>
</head>
<body>
</body>
</html>
